        $("#check_eco").click(function () {

      function soloNumeros(e){
	    var key = window.Event ? e.which : e.keyCode
	    return (key >= 48 && key <= 57 )
      }

      function genera_select() {
        var txt = "<option value='-1' selected='selected'>---</option>";
        for (i = 0; i < SUC.length; i++) {
          txt += "<option value='" + i + "'>" + SUC[i][1] + "</option>";
        }
        $("#suc").html(txt);
      }

      function cambia_codarea() {
  pos = $("#suc option:selected").val();
  if (pos >= 0) {
    $("#cod_area").empty();
    $("#calle").empty();
    $("#comuna").empty();
    $("#calle").html(SUC[pos][2]);
    $("#comuna").html(SUC[pos][4]); 
    $("#cod_area").html(SUC[pos][6]);
  }
}

      function carga_datos() {
        error = "";

        suc = $("#suc option:selected").val();

        if (suc == "-1") {
          error += "Seleccione Sucursal\n";
        }

        nombre = $.trim($("#pnombre").val());

        if (nombre == "") {
          error += " Ingrese Nombre\n";
        } else {
          nombre = toTitleCase(nombre);
        }

        paterno = $.trim($("#paterno").val());
        if (paterno == "") {
          error += " Ingrese Apellido Paterno\n";
        } else {
          paterno = toTitleCase(paterno);
        }

        materno = $.trim($("#materno").val());
        if (materno == "") {
          error += " Ingrese Apellido Materno\n";
        } else {
          materno = toTitleCase(materno.substring(0, 1)) + ".";
        }

        cargo = $.trim($("#cargo").val());
        if (cargo == "") {
          error += " Ingrese Cargo\n";
        }

        correo = $.trim($("#correo").val());

        if (correo == "") {
          error += " Ingrese E-Mail \n";
        } else {
          correo = correo.toLowerCase();
          if (validarMail(correo) == false) {
            error += " E-mail (No V\u00e1lido)\n";
          }
        }

        celular = $.trim($("#celular").val());

        if (error != "") {
          alert(error);
          return;
        }

        $("#cod_area").empty();
        $("#calle").empty();
        $("#comuna").empty();

        $("#calle").html(SUC[suc][2]);
        $("#comuna").html(SUC[suc][4]);
        $("#cod_area").html(SUC[suc][5]);
        $("#txt_nombre").html(nombre);
        $("#txt_paterno").html(paterno);
        $("#txt_materno").html(materno);
        $("#txt_cargo").html(cargo);
        $("#a_correo").html(correo);
        $("#a_correo").attr("href", "mailto:" + correo);

        celular = $.trim($("#celular").val());

        if (celular == "") {
          $("#txt_celular").empty();
          $("#txt_celular").hide();
        } else {
          $("#txt_celular").html("Cel: +51 " + celular + "<br>");
          $("#txt_celular").show();
        }

        if ($("#check_eco").is(":checked")) {
          $("#tr_eco").show();
        } else {
          $("#tr_eco").hide();
        }

        if ($("#check_banner").is(":checked")) {
          $("#tr_banner").show();
        } else {
          $("#tr_banner").hide();
        }

        $("#original").html($("#pie").html());

        if (celular == "") {
          $("#txt_celular").remove();
        }

        if (!$("#check_eco").is(":checked")) {
          $("#tr_eco").remove();
        }

        if (!$("#check_banner").is(":checked")) {
          $("#tr_banner").remove();
        }

        $("#codigo").html($("#pie").html());
        $("#pie").html($("#original").html());

        window.scrollTo(0,document.body.scrollHeight);
      }

      function validarMail(valor) {
        var x = valor;
        var atpos = x.indexOf("@");
        var dotpos = x.lastIndexOf(".");
        if (atpos < 1 || dotpos < atpos + 2 || dotpos + 2 >= x.length) {
          return false;
        }
        return true;
      }

      function validarSiNumero(numero) {
        if (!/^([0-9])*$/.test(numero)) {
          return false;
        } else {
          return true;
        }
      }

      function toTitleCase(str) {
        return str.replace(/\w\S*/g, function (txt) {
          return txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase();
        });
      }

      function copiarFirma() {
        const firma = document.getElementById("firma");

        const range = document.createRange();
        range.selectNode(firma);

        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);

        try {
          document.execCommand("copy");
          alert("Firma copiada correctamente");
        } catch (err) {
          alert("No se pudo copiar la firma");
        }

        selection.removeAllRanges();
      }
